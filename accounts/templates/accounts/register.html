{% load static %}
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <link rel="stylesheet" href="{% static 'accounts/css/reg-log-styles.css' %}">
</head>

<body>
  <div id="window-reg">

  <div class="header">
    <h3>Sign up</h3>
    <p>Enter your information to create an account.</p>
  </div>

  <form method="POST" action="{% url 'signup' %}">

    {% csrf_token %}

    <div class="row">
      <div class="field">
        <label><b>First name</b></label>
        <input 
        type="text" 
        name="firstName" 
        placeholder="Enter your first name" 
        required>
      </div>

      <div class="field">
        <label><b>Last name</b></label>
        <input 
        type="text" 
        name="lastName" 
        placeholder="Enter your last name" 
        required>
      </div>
    </div>

    <div class="field big">
      <label><b>Email</b></label>
      <input 
      type="email" 
      name="email" 
      placeholder="Enter your email"
      class="{% if errors.email %}input-error{% endif %}" 
      required>
    </div>

      {% if errors.email %}
          <p class="error-text">There is already a user with this email</p>
      {% endif %}

    <div class="field big">
      <label><b>Password</b></label>
      <input 
      type="password" 
      name="password" 
      placeholder="Enter your password" 
      required>
    </div>

    <button type="submit" class="create-button">
      Create an account
    </button>

  </form>

  <div class="last-text">
    Already have an account?
    <a href="{% url 'log' %}">Login</a>
  </div>

  </div>

</body>

</html>
