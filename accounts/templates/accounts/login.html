{% load static %}
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="{% static 'accounts/css/reg-log-styles.css' %}">
</head>

<body>
    <div id="window-log">

        <form method="POST" action="{% url 'login' %}">

        {% csrf_token %}

        <div class="header">
            <h3>Login</h3>
            <p>Enter your email below to login to your account.</p>
        </div>
        <div class="field big"> 
            <label><b>Email</b></label>
            <input 
            type="email" 
            name="email" 
            placeholder="Enter your email">
        </div>
        <div class="field big">
            <label><b>Password</b></label>
            <input 
            type="password" 
            name = "password" 
            placeholder="Enter your password" 
            class="{% if error %}input-error{% endif %}">
        </div>

        {% if error %}
            <p class="error-text">Wrong password or email</p>
        {% endif %}

        <button type="submit" class="create-button">
            Login
        </button>

      </form>

        <div class="last-text">
        Don't have an account?
        <a href="{% url 'reg' %}">Sign up</a>
        </div>

</body>

</html>
